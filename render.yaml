services:
  # Express Backend Service
  - type: web
    name: gsoms-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # React Frontend (Static Site) Service
  - type: web
    name: gsoms-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gsoms-backend
          property: url
